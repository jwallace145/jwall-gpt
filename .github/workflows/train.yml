name: Train

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag to train (leave empty for latest release)"
        required: false
        type: string
      training_config:
        description: "Model/training config to use"
        required: false
        default: "configs/tiny.py"
        # Keep in sync with configs/*.py
        type: choice
        options:
          - configs/tiny.py
          - configs/nano.py
          - configs/small.py
      dataset:
        description: "Registered dataset key to train on"
        required: false
        default: "tinystories"
        # Keep in sync with jwall_gpt.data.datasets.DATASETS
        type: choice
        options:
          - tinystories
          - wikitext103
      tokenizer:
        description: "Tokenizer the dataset was prepared with"
        required: false
        default: "gpt2"
        type: string
      max_steps:
        description: "Optional max training steps override"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName)"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Training run plan"
            echo "- Release: \`${TAG}\`"
            echo "- Dataset: \`${{ inputs.dataset }}\` (\`${{ inputs.tokenizer }}\`)"
            echo "- Config: \`${{ inputs.training_config }}\`"
            echo "- Max steps override: \`${{ inputs.max_steps || 'config default' }}\`"
            echo ""
            echo "Waiting for **training** environment approval before launching AWS resources."
          } >> "${GITHUB_STEP_SUMMARY}"

  launch-trainer:
    needs: prepare
    runs-on: ubuntu-latest
    environment: training
    env:
      PROJECT_NAME: jwall-gpt
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Load infrastructure parameters from SSM
        id: infra
        run: |
          PROJECT="${PROJECT_NAME}"
          echo "launch_template_id=$(aws ssm get-parameter --name "/${PROJECT}/launch-template-id" --query 'Parameter.Value' --output text)" >> "${GITHUB_OUTPUT}"
          echo "instance_profile=$(aws ssm get-parameter --name "/${PROJECT}/trainer-instance-profile" --query 'Parameter.Value' --output text)" >> "${GITHUB_OUTPUT}"
          echo "training_bucket=$(aws ssm get-parameter --name "/${PROJECT}/training-bucket" --query 'Parameter.Value' --output text)" >> "${GITHUB_OUTPUT}"
          echo "datasets_bucket=$(aws ssm get-parameter --name "/${PROJECT}/datasets-bucket" --query 'Parameter.Value' --output text)" >> "${GITHUB_OUTPUT}"

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Launch training worker
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TRAINING_CONFIG: ${{ inputs.training_config }}
          TRAINING_BUCKET: ${{ steps.infra.outputs.training_bucket }}
          DATASETS_BUCKET: ${{ steps.infra.outputs.datasets_bucket }}
          DATASET: ${{ inputs.dataset }}
          TOKENIZER: ${{ inputs.tokenizer }}
          GITHUB_REPO: ${{ github.repository }}
          MAX_STEPS: ${{ inputs.max_steps }}
          RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          USER_DATA_FILE="$(mktemp)"
          bash scripts/aws/render-user-data.sh > "${USER_DATA_FILE}"

          # Subnet, security group, and public-IP assignment are baked into the
          # launch template's primary network interface, so they must not be
          # passed here (instance-level networking conflicts with the template's
          # network interface).
          RUN_ARGS=(
            --launch-template "LaunchTemplateId=${{ steps.infra.outputs.launch_template_id }}"
            --iam-instance-profile "Name=${{ steps.infra.outputs.instance_profile }}"
            --user-data "file://${USER_DATA_FILE}"
            --tag-specifications "ResourceType=instance,Tags=[{Key=Release,Value=${RELEASE_TAG}},{Key=Project,Value=${PROJECT_NAME}},{Key=ManagedBy,Value=github-actions}]"
            --count 1
          )

          INSTANCE_ID="$(aws ec2 run-instances "${RUN_ARGS[@]}" --query 'Instances[0].InstanceId' --output text)"
          CONFIG_NAME="$(basename "${TRAINING_CONFIG}" .py)"
          echo "Launched training worker: ${INSTANCE_ID}"
          echo "Release: ${RELEASE_TAG}"
          echo "Dataset: ${DATASET} (${TOKENIZER})"
          echo "Run: ${RUN_ID}"
          echo "Checkpoints will sync to s3://${TRAINING_BUCKET}/checkpoints/${RELEASE_TAG}/${CONFIG_NAME}/${DATASET}/${RUN_ID}/"
