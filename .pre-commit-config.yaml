default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff-format
        stages: [pre-commit]
      - id: ruff
        stages: [pre-commit]
        args: [--fix]
      - id: ruff
        name: ruff-check-strict
        stages: [pre-push]
        args: []
      - id: ruff-format
        name: ruff-format-check
        stages: [pre-push]
        args: [--check]

  - repo: local
    hooks:
      - id: uv-lock-check
        name: uv lock --check
        entry: uv lock --check
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest-cov
        name: pytest with coverage
        entry: uv run pytest --cov=jwall_gpt --cov-fail-under=80
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: uv-build
        name: uv build
        entry: uv build
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.6.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
